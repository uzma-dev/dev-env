# Tmux configuration.
# Tmux lets you split your terminal into panes and keep sessions alive
# even after you close the terminal window.

# ── Prefix key ─────────────────────────────────────────────────────────────
# Change prefix from Ctrl+B (hard to reach) to Ctrl+A
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── Terminal & colors ───────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true color support

# ── General ─────────────────────────────────────────────────────────────────
set -g history-limit 10000           # scrollback buffer size
set -g base-index 1                  # start window numbering at 1 (not 0)
setw -g pane-base-index 1            # start pane numbering at 1
set -g renumber-windows on           # renumber windows when one is closed
set -g escape-time 0                 # no delay after pressing Esc (important for Neovim)
set -g focus-events on               # let Neovim know when window is focused

# ── Mouse support ───────────────────────────────────────────────────────────
set -g mouse on                      # click to select pane, scroll with trackpad

# ── Easier pane splitting ────────────────────────────────────────────────────
# Use | and - instead of % and " (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation ─────────────────────────────────────────────────────────
# Use Ctrl+A + h/j/k/l to move between panes (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Copy mode (vim keybindings) ──────────────────────────────────────────────
setw -g mode-keys vi

# Enter copy mode with Ctrl+A + [
# In copy mode: v to start selection, y to copy, q to quit
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"   # copy to macOS clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Reload config ────────────────────────────────────────────────────────────
# Ctrl+A + r to reload this file without restarting tmux
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"          # Catppuccin Mocha colors
set -g status-left " #[bold]#S "                     # session name on the left
set -g status-right " %H:%M  %d %b "                # time and date on the right
set -g status-left-length 20
set -g status-right-length 30

# Active window: bold and highlighted
setw -g window-status-current-style "bold,fg=#89b4fa"    # blue for active
setw -g window-status-style "fg=#6c7086"                  # gray for inactive
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# Active pane border: subtle highlight
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
