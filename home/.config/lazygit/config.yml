# Lazygit configuration.
# Lazygit is a terminal UI for git — press 'lzg' to open it.
# Docs: https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md

gui:
  # Window layout: even split between file list and diff view
  sidePanelWidth: 0.3
  expandFocusedSidePanel: true
  showIcons: true

  # Catppuccin Mocha color theme
  theme:
    activeBorderColor:
      - "#89b4fa"   # blue
      - bold
    inactiveBorderColor:
      - "#313244"
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#89b4fa"
    unstagedChangesColor:
      - "#f38ba8"   # red
    defaultFgColor:
      - "#cdd6f4"

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never   # use git-delta for nicer diffs
  commit:
    signOff: false
  branchLogCmd: "git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --"

keybinding:
  universal:
    quit: "q"
    return: "<esc>"
    nextScreenMode: "+"
    prevScreenMode: "_"
